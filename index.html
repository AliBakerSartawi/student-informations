<!DOCTYPE html>
  <html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/reset.css">
    <link rel="stylesheet" href="./css/style.css">
    <title>Student Informations</title>
  </head>
  <body>

    <header>
      <h1>ASAC</h1>
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </header>

    <main>

      <section id="form-section">
        <form id="form">
          <label for="email">Student Email</label>
          <input type="text" id="email" required><br>

          <label for="number">Student Mobile Number</label>
          <input type="number" id="number" required><br>
          
          <label for="tuition">Tuition</label>
          <select name="tuition" id="tuition">
            <option value="100">100 JD</option>
            <option value="500">500 JD</option>
            <option value="1000">1000 JD</option>
          </select>
          
          <br>
          <input type="submit" id="submit">
        </form>
      </section>

      <section id="table-section">
        <table id="table">
          <tr id="table-header">
            <td>id</td>
            <td>Name</td>
            <td>Email</td>
            <td>Mobile</td>
            <td>Age</td>
            <td>Tuition</td>
          </tr>
        </table>
        <section id="total-section">
          <p>Total: <span id="total">0</span></p>
        </section>
      </section>
    </main>

    <footer></footer>
    
    <script src="./js/app.js"></script>
  </body>
</html>
